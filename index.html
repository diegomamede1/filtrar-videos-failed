<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtrar Vídeos Draft - Panda Video</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        input, button { margin: 10px 0; padding: 8px; }
        ul { list-style: none; padding: 0; }
        li { margin: 5px 0; }
        .video-item { display: flex; align-items: center; }
        .video-item input { margin-right: 10px; }
        .select-all { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Gerenciar Vídeos Draft - Panda Video</h1>
    <label for="token">Token API:</label>
    <input type="text" id="token" placeholder="Insira seu token API">
    <button id="loadBtn">Carregar Vídeos Draft</button>
    
    <div class="select-all">
        <input type="checkbox" id="selectAll">
        <label for="selectAll">Selecionar Todos</label>
    </div>
    
    <ul id="videoList"></ul>
    
    <button id="deleteBtn">Deletar Selecionados</button>
    
    <script>
        const tokenInput = document.getElementById('token');
        const loadBtn = document.getElementById('loadBtn');
        const selectAll = document.getElementById('selectAll');
        const videoList = document.getElementById('videoList');
        const deleteBtn = document.getElementById('deleteBtn');
        
        let videos = [];
        
        loadBtn.addEventListener('click', async () => {
            const token = tokenInput.value.trim();
            if (!token) {
                alert('Por favor, insira o token API.');
                return;
            }
            
            try {
                const response = await fetch('https://api-v2.pandavideo.com.br/videos', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`Erro: ${response.status}`);
                }
                
                const data = await response.json();
                videos = data.videos ? data.videos.filter(video => video.status === 'DRAFT') : [];
                
                renderVideos();
            } catch (error) {
                alert('Erro ao carregar vídeos: ' + error.message);
            }
        });
        
        function renderVideos() {
            videoList.innerHTML = '';
            videos.forEach(video => {
                const li = document.createElement('li');
                li.className = 'video-item';
                li.innerHTML = `
                    <input type="checkbox" class="video-checkbox" data-id="${video.id}">
                    <span>${video.title || 'Vídeo sem título'} (ID: ${video.id})</span>
                `;
                videoList.appendChild(li);
            });
        }
        
        selectAll.addEventListener('change', () => {
            const checkboxes = document.querySelectorAll('.video-checkbox');
            checkboxes.forEach(cb => cb.checked = selectAll.checked);
        });
        
        deleteBtn.addEventListener('click', async () => {
            const token = tokenInput.value.trim();
            if (!token) {
                alert('Por favor, insira o token API.');
                return;
            }
            
            const selected = document.querySelectorAll('.video-checkbox:checked');
            if (selected.length === 0) {
                alert('Selecione pelo menos um vídeo para deletar.');
                return;
            }
            
            const confirmDelete = confirm(`Tem certeza que deseja deletar ${selected.length} vídeo(s)?`);
            if (!confirmDelete) return;
            
            for (const cb of selected) {
                const videoId = cb.dataset.id;
                try {
                    const response = await fetch(`https://api-v2.pandavideo.com.br/videos/${videoId}`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    
                    if (!response.ok) {
                        throw new Error(`Erro ao deletar vídeo ${videoId}: ${response.status}`);
                    }
                } catch (error) {
                    alert(error.message);
                }
            }
            
            alert('Vídeos deletados com sucesso.');
            // Recarregar lista
            loadBtn.click();
        });
    </script>
</body>
</html>
